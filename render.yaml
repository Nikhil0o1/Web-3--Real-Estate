# $0 deployment profile (no Render-managed Postgres, no paid worker).
#
# 1) Create a FREE Postgres elsewhere (e.g. https://neon.tech — copy connection string).
# 2) In Render Dashboard → this Web Service → Environment:
#    - DATABASE_URL = <paste Neon "postgresql://..." URL>
#    - SEPOLIA_RPC_URL, DEPLOYER_PRIVATE_KEY, AUTH_JWT_SECRET, INDEXER_START_BLOCK
#    - BACKEND_URL, FRONTEND_URL, CORS_ORIGINS (after Vercel deploy)
# 3) Run migrations once: Render Shell → alembic upgrade head (repo root `alembic.ini`).
#
# Indexer runs inside the web process (RUN_INDEXER_IN_WEB=true). Free tier sleeps
# when idle — first request after sleep can be slow; indexing resumes on wake.

services:
  - type: web
    name: estatechain-backend
    env: python
    plan: free
    region: oregon
    # runtime-config.js is gitignored; generate it at build (needs Node on PATH).
    buildCommand: npm install && node scripts/generate-runtime-config.js && pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DEPLOY_ENV
        value: production
      - key: RUN_INDEXER_IN_WEB
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: CHAIN_ID
        value: "11155111"
      - key: AUTH_JWT_ALGORITHM
        value: HS256
      - key: AUTH_JWT_ISSUER
        value: estatechain
      - key: AUTH_SESSION_TTL_HOURS
        value: "24"
      - key: AUTH_NONCE_TTL_SECONDS
        value: "300"
      - key: CONTRACT_ADDRESSES_PATH
        value: backend/config/contract-addresses.json
      - key: ARTIFACTS_DIR
        value: artifacts/contracts
      # Paste in Render Dashboard (from Neon / Alchemy / your deploy):
      - key: DATABASE_URL
        sync: false
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: DEPLOYER_PRIVATE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: INDEXER_START_BLOCK
        sync: false
